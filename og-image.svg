<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="100%" stop-color="#070405"/>
    </linearGradient>
    <radialGradient id="halo1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FF7A2A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF7A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#C91A4A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C91A4A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="55%" stop-color="#FF7A2A"/>
      <stop offset="100%" stop-color="#C91A4A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo1)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <!-- Diamond + flame mark -->
  <g transform="translate(160 195)">
    <path d="M120 0 L240 140 L120 280 L0 140 Z" fill="none" stroke="url(#flame)" stroke-width="3" stroke-linejoin="round" opacity="0.85"/>
    <path d="M120 80 C 144 112 160 128 160 160 C 160 188 142 208 120 208 C 98 208 80 188 80 160 C 80 140 96 128 100 108 C 102 120 110 128 114 128 C 120 128 116 100 120 80 Z" fill="url(#flame)"/>
  </g>

  <!-- Text -->
  <g transform="translate(480 230)" font-family="'Bebas Neue', Impact, sans-serif" fill="#fff8ee">
    <text x="0" y="0" font-size="120" letter-spacing="-2">THAT<tspan fill="url(#flame)">WAS</tspan>EPIC</text>
    <text x="4" y="80" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#e8d9c6">Entertainment that becomes participation.</text>
    <text x="4" y="130" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#9a8a7c">Watch · Follow · Support · Share — every official link in one place.</text>
  </g>
</svg>
